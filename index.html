<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impact Map</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #eef0f4; min-height: 100vh; }

header {
  background: #1e2a38; color: #fff;
  padding: 10px 20px; display: flex; align-items: center; gap: 12px;
  position: sticky; top: 0; z-index: 200;
  box-shadow: 0 2px 8px rgba(0,0,0,0.35);
}
header h1 { font-size: 1rem; font-weight: 700; }
.hdr-sub { font-size: 0.72rem; opacity: 0.5; }
.hdr-sp { flex: 1; }
.hdr-btn {
  background: none; border: 1px solid rgba(255,255,255,0.3);
  color: #fff; padding: 4px 12px; border-radius: 4px;
  cursor: pointer; font-size: 0.78rem; transition: background 0.15s;
}
.hdr-btn:hover { background: rgba(255,255,255,0.12); }

#map-wrap {
  overflow: auto;
  padding: 32px;
  position: relative;
}

#map-canvas {
  position: relative;
}

#map-svg {
  position: absolute; top: 0; left: 0;
  pointer-events: none; overflow: visible;
}

.node {
  position: absolute;
  background: #fff;
  border-radius: 8px;
  padding: 10px 12px;
  width: 180px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.12);
  transition: box-shadow 0.15s;
}
.node:hover { box-shadow: 0 3px 14px rgba(0,0,0,0.18); }

.node-goal   { border-left: 4px solid #4472C4; }
.node-actor  { border-left: 4px solid #ED7D31; }
.node-impact { border-left: 4px solid #70AD47; }
.node-task   { border-left: 4px solid #FFC000; }

.node-label {
  font-size: 0.58rem; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  opacity: 0.4; margin-bottom: 3px;
}

.node-text {
  font-size: 0.82rem; color: #1e2a38;
  line-height: 1.45; outline: none;
  min-height: 18px; word-break: break-word;
}
.node-goal .node-text { font-size: 0.9rem; font-weight: 600; }
.node-text:focus { background: #f5f7ff; border-radius: 3px; padding: 1px 3px; margin: -1px -3px; }
.node-text[data-ph]:empty::before { content: attr(data-ph); color: #ccc; pointer-events: none; }

.node-actions {
  display: none; gap: 4px;
  margin-top: 8px; justify-content: flex-end;
}
.node:hover .node-actions { display: flex; }

.nbtn {
  background: none; border: none; cursor: pointer;
  font-size: 0.72rem; padding: 2px 6px; border-radius: 3px;
  color: #bbb; transition: color 0.1s, background 0.1s;
}
.nbtn.add { color: #5a9; }
.nbtn.add:hover { background: #f0fff4; color: #27ae60; }
.nbtn.del:hover { background: #fff0f0; color: #e74c3c; }

.col-label {
  position: absolute;
  font-size: 0.7rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.09em;
  color: #8899aa; text-align: center;
  width: 180px;
}

.add-btn-floating {
  position: absolute;
  background: none; border: 2px dashed #ccc;
  border-radius: 8px; width: 180px; padding: 7px;
  cursor: pointer; font-size: 0.78rem; color: #aaa;
  transition: border-color 0.15s, color 0.15s;
}
.add-btn-floating:hover { border-color: #888; color: #555; }
</style>
</head>
<body>

<header>
  <div>
    <div class="hdr-sub">Strategic Planning</div>
    <h1>Impact Map</h1>
  </div>
  <div class="hdr-sp"></div>
  <button class="hdr-btn" onclick="clearAll()">Clear</button>
  <button class="hdr-btn" onclick="exportJSON()">Export</button>
  <button class="hdr-btn" onclick="importJSON()">Import</button>
</header>

<div id="map-wrap">
  <div id="map-canvas">
    <svg id="map-svg"></svg>
  </div>
</div>

<script>
// ── Layout constants ──────────────────────────────────────────────────────────
const CARD_W  = 180;
const CARD_H  = 72;   // assumed fixed height for layout calculations
const UNIT_H  = 92;   // vertical pixels per leaf node
const COL_GAP = 80;   // horizontal gap between columns (space for arrows)
const PAD_X   = 40;
const PAD_TOP = 52;   // room for column labels
const PAD_BOT = 70;   // room for add-actor button

function colX(c) { return PAD_X + c * (CARD_W + COL_GAP); }

// ── State ─────────────────────────────────────────────────────────────────────

function uid() { return Math.random().toString(36).slice(2, 9); }

let state = { goal: { id: uid(), text: '' }, actors: [] };

// ── Layout computation ────────────────────────────────────────────────────────

function impLeaves(imp)  { return Math.max(1, imp.tasks.length); }
function actorLeaves(a)  { return Math.max(1, a.impacts.reduce((s, i) => s + impLeaves(i), 0)); }
function totalLeaves()   { return Math.max(1, state.actors.reduce((s, a) => s + actorLeaves(a), 0)); }

// Returns { x, y (top), cy (center), rx (right edge x), lx (left edge x) }
function nodePos(x, cy) {
  return { x, cy, y: cy - CARD_H / 2, rx: x + CARD_W, lx: x };
}

function computePositions() {
  const pos   = {};
  const total = totalLeaves();
  const contentH = total * UNIT_H;

  pos[state.goal.id] = nodePos(colX(0), PAD_TOP + contentH / 2);

  let aTop = 0;
  for (const actor of state.actors) {
    const al = actorLeaves(actor);
    pos[actor.id] = nodePos(colX(1), PAD_TOP + (aTop + al / 2) * UNIT_H);

    let iTop = aTop;
    for (const imp of actor.impacts) {
      const il = impLeaves(imp);
      pos[imp.id] = nodePos(colX(2), PAD_TOP + (iTop + il / 2) * UNIT_H);

      imp.tasks.forEach((task, ti) => {
        pos[task.id] = nodePos(colX(3), PAD_TOP + (iTop + ti + 0.5) * UNIT_H);
      });

      iTop += il;
    }
    aTop += al;
  }

  return {
    pos,
    W: colX(3) + CARD_W + PAD_X,
    H: PAD_TOP + contentH + PAD_BOT,
    contentH,
  };
}

// ── Render ────────────────────────────────────────────────────────────────────

function render() {
  const { pos, W, H, contentH } = computePositions();
  const canvas = document.getElementById('map-canvas');
  const svg    = document.getElementById('map-svg');

  // Remove previous nodes and floating elements
  [...canvas.querySelectorAll('.node, .col-label, .add-btn-floating')].forEach(e => e.remove());

  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  svg.setAttribute('width',  W);
  svg.setAttribute('height', H);

  // Column labels
  [
    { col: 0, title: 'Goal',    sub: 'Why?'  },
    { col: 1, title: 'Actors',  sub: 'Who?'  },
    { col: 2, title: 'Impacts', sub: 'How?'  },
    { col: 3, title: 'Tasks',   sub: 'What?' },
  ].forEach(({ col, title, sub }) => {
    const lbl = document.createElement('div');
    lbl.className = 'col-label';
    lbl.style.left = colX(col) + 'px';
    lbl.style.top  = '6px';
    lbl.innerHTML  = `${title} <span style="opacity:.6;font-weight:400;letter-spacing:0">${sub}</span>`;
    canvas.appendChild(lbl);
  });

  // Nodes and arrows
  const arrowPaths = [];

  const goalPos = pos[state.goal.id];
  canvas.appendChild(makeNode('goal', state.goal, goalPos));

  for (const actor of state.actors) {
    const aPos = pos[actor.id];
    canvas.appendChild(makeNode('actor', actor, aPos));
    arrowPaths.push(bezier(goalPos, aPos, '#ED7D31', 'ah-actor'));

    for (const imp of actor.impacts) {
      const iPos = pos[imp.id];
      canvas.appendChild(makeNode('impact', imp, iPos));
      arrowPaths.push(bezier(aPos, iPos, '#70AD47', 'ah-impact'));

      for (const task of imp.tasks) {
        const tPos = pos[task.id];
        canvas.appendChild(makeNode('task', task, tPos));
        arrowPaths.push(bezier(iPos, tPos, '#FFC000', 'ah-task'));
      }
    }
  }

  svg.innerHTML = svgDefs() + arrowPaths.join('\n');

  // Floating add-actor button below actors column
  const addActorBtn = document.createElement('button');
  addActorBtn.className = 'add-btn-floating';
  addActorBtn.textContent = '+ Add Actor';
  addActorBtn.style.left = colX(1) + 'px';
  addActorBtn.style.top  = (PAD_TOP + contentH + 10) + 'px';
  addActorBtn.onclick = () => addActor();
  canvas.appendChild(addActorBtn);

  save();
}

function svgDefs() {
  const mkMarker = (id, color) =>
    `<marker id="${id}" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0.5 L6,3.5 L0,6.5 Z" fill="${color}"/>
    </marker>`;
  return `<defs>
    ${mkMarker('ah-actor',  '#ED7D31')}
    ${mkMarker('ah-impact', '#70AD47')}
    ${mkMarker('ah-task',   '#FFC000')}
  </defs>`;
}

// Cubic bezier curve from right edge of parent to left edge of child
function bezier(from, to, color, markerId) {
  const x1 = from.rx, y1 = from.cy;
  const x2 = to.lx,   y2 = to.cy;
  const mx = (x1 + x2) / 2;
  return `<path d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}"
    fill="none" stroke="${color}" stroke-width="1.8" opacity="0.75"
    marker-end="url(#${markerId})"/>`;
}

const NODE_LABEL = { goal: 'Goal', actor: 'Actor', impact: 'Impact', task: 'Task' };
const PLACEHOLDER = {
  goal:   'Measurable business objective…',
  actor:  'Who can influence the outcome?',
  impact: 'How should behaviour change?',
  task:   'Feature or activity…',
};

function makeNode(type, item, p) {
  const div = document.createElement('div');
  div.className  = `node node-${type}`;
  div.dataset.id = item.id;
  div.style.left = p.x + 'px';
  div.style.top  = p.y + 'px';

  const lbl = document.createElement('div');
  lbl.className   = 'node-label';
  lbl.textContent = NODE_LABEL[type];

  const txt = document.createElement('div');
  txt.className       = 'node-text';
  txt.contentEditable = 'true';
  txt.setAttribute('data-ph', PLACEHOLDER[type]);
  txt.textContent = item.text;
  txt.addEventListener('input', () => { item.text = txt.textContent; save(); });

  const acts = document.createElement('div');
  acts.className = 'node-actions';

  if (type !== 'task') {
    const childLabel = type === 'goal' ? 'Actor' : type === 'actor' ? 'Impact' : 'Task';
    const addBtn = document.createElement('button');
    addBtn.className   = 'nbtn add';
    addBtn.textContent = `+ ${childLabel}`;
    addBtn.onclick = () => {
      if (type === 'goal')   addActor();
      if (type === 'actor')  addImpact(item.id);
      if (type === 'impact') addTask(item.id);
    };
    acts.appendChild(addBtn);
  }

  if (type !== 'goal') {
    const delBtn = document.createElement('button');
    delBtn.className   = 'nbtn del';
    delBtn.textContent = '✕';
    delBtn.onclick = () => deleteNode(type, item.id);
    acts.appendChild(delBtn);
  }

  div.appendChild(lbl);
  div.appendChild(txt);
  div.appendChild(acts);
  return div;
}

// ── State mutations ───────────────────────────────────────────────────────────

function addActor() {
  const a = { id: uid(), text: '', impacts: [] };
  state.actors.push(a);
  render();
  focusId(a.id);
}

function addImpact(actorId) {
  const actor = state.actors.find(a => a.id === actorId);
  if (!actor) return;
  const imp = { id: uid(), text: '', tasks: [] };
  actor.impacts.push(imp);
  render();
  focusId(imp.id);
}

function addTask(impactId) {
  for (const actor of state.actors) {
    const imp = actor.impacts.find(i => i.id === impactId);
    if (imp) {
      const task = { id: uid(), text: '' };
      imp.tasks.push(task);
      render();
      focusId(task.id);
      return;
    }
  }
}

function deleteNode(type, id) {
  if (type === 'actor') {
    state.actors = state.actors.filter(a => a.id !== id);
  } else if (type === 'impact') {
    for (const a of state.actors) a.impacts = a.impacts.filter(i => i.id !== id);
  } else if (type === 'task') {
    for (const a of state.actors)
      for (const i of a.impacts)
        i.tasks = i.tasks.filter(t => t.id !== id);
  }
  render();
}

function focusId(id) {
  const node = document.querySelector(`.node[data-id="${id}"]`);
  if (node) node.querySelector('.node-text')?.focus();
}

// ── Persistence ───────────────────────────────────────────────────────────────

function save() {
  localStorage.setItem('impact-map-v2', JSON.stringify(state));
}

function load() {
  try {
    const raw = localStorage.getItem('impact-map-v2');
    if (raw) { const d = JSON.parse(raw); if (d.goal && d.actors) state = d; }
  } catch (_) {}
}

function clearAll() {
  if (!confirm('Clear everything?')) return;
  state = { goal: { id: uid(), text: '' }, actors: [] };
  render();
}

function exportJSON() {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' }));
  a.download = 'impact-map.json';
  a.click();
}

function importJSON() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json';
  inp.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        if (d.goal && Array.isArray(d.actors)) { state = d; render(); }
        else alert('Invalid impact map file.');
      } catch (_) { alert('Could not parse file.'); }
    };
    reader.readAsText(file);
  };
  inp.click();
}

// ── Init ──────────────────────────────────────────────────────────────────────

load();

// Seed example content if empty
if (!state.actors.length) {
  state.goal.text = 'Increase monthly active users by 20%';
  state.actors = [
    {
      id: uid(), text: 'New User',
      impacts: [
        { id: uid(), text: 'Signs up easily', tasks: [
          { id: uid(), text: 'Streamline onboarding' },
          { id: uid(), text: 'Add social login' },
        ]},
        { id: uid(), text: 'Invites friends', tasks: [
          { id: uid(), text: 'Add referral program' },
        ]},
      ],
    },
    {
      id: uid(), text: 'Power User',
      impacts: [
        { id: uid(), text: 'Uses advanced features', tasks: [
          { id: uid(), text: 'Improve feature discovery' },
          { id: uid(), text: 'Add in-app tutorials' },
        ]},
        { id: uid(), text: 'Shares results publicly', tasks: [
          { id: uid(), text: 'Export & share feature' },
        ]},
      ],
    },
  ];
}

render();
</script>
</body>
</html>
